version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: footballprediction_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Data/MCD.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    restart: unless-stopped

  fastapi:
    build:
      context: ./FastAPI_App
      dockerfile: Dockerfile.api
    container_name: fastapi_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/footballprediction_db
      DATABASE_APP_URL: postgresql://postgres:postgres@postgres:5432/footballprediction_db
      DATABASE_ML_URL: postgresql://postgres:postgres@postgres:5432/footballprediction_db
      ML_API_URL: http://fastapi-ml:8001
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    volumes:
      - ./Data:/app/Data
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  fastapi-ml:
    build:
      context: .
      dockerfile: ./FastAPI_ML/Dockerfile
    container_name: fastapi_ml
    environment:
      DATABASE_ML_URL: postgresql://postgres:postgres@postgres:5432/footballprediction_db
      MODEL_PATH: /app/Data/dataset/match_model_v1.joblib
      DATASET_PATH: /app/Data/dataset/completed_match_dataset_final.csv
      DATA_DIR: /app/Data
    ports:
      - "8001:8001"
    volumes:
      - ./Data:/app/Data
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./match_prediction_app-front
      dockerfile: Dockerfile
    container_name: frontend_app
    ports:
      - "80:80"
    depends_on:
      - fastapi
      - fastapi-ml
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
