name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Lint FastAPI_App
        run: |
          cd FastAPI_App
          ruff check .
          ruff format --check .

      - name: Lint FastAPI_ML
        run: |
          cd FastAPI_ML
          ruff check .
          ruff format --check .

  test-fastapi-app:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd FastAPI_App
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/test_db
        run: |
          cd FastAPI_App
          pytest tests/ -v

  test-fastapi-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd FastAPI_ML
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run ML tests
        run: |
          cd FastAPI_ML
          pytest tests_ml/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd match_prediction_app-front
          npm ci

      - name: Run tests
        run: |
          cd match_prediction_app-front
          npm run test:unit
