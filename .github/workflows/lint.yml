name: Lint

on:
  push:
    branches:
      - "**"

jobs:

  lint-python-app:
    name: Ruff — FastAPI_App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check FastAPI_App/

  lint-python-ml:
    name: Ruff — FastAPI_ML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check FastAPI_ML/

  test-python-app:
    name: Tests — FastAPI_App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r FastAPI_App/requirements.txt

      - name: Run tests
        working-directory: FastAPI_App
        run: pytest tests/ -v

  test-python-ml:
    name: Tests — FastAPI_ML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r FastAPI_ML/requirements.txt
          pip install -e shared/

      - name: Run tests
        working-directory: FastAPI_ML
        env:
          DATABASE_ML_URL: sqlite:///./test.db
        run: pytest tests_ml/ -v