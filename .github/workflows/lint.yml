name: Lint

on:
  push:
    branches:
      - "**"

jobs:

  lint-python-app:
    name: Ruff — FastAPI_App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check FastAPI_App/

  lint-python-ml:
    name: Ruff — FastAPI_ML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check FastAPI_ML/

  test-python-app:
    name: Tests — FastAPI_App
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: footballapp_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r FastAPI_App/requirements.txt

      - name: Run tests
        working-directory: FastAPI_App
        env:
          DATABASE_APP_URL: postgresql://postgres:postgres@localhost:5432/footballapp_app_test
        run: pytest tests/ -v